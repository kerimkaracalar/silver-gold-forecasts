'use client';

import { useState, useEffect, useCallback } from 'react';
import { RefreshCw, TrendingUp, TrendingDown, Zap, Scale, AlertCircle, Clock } from 'lucide-react';

type Asset = 'gold' | 'silver' | 'compare';
type Horizon = 'kisa' | 'orta' | 'uzun' | 'tumu';

interface PriceData {
  gold: number | null;
  silver: number | null;
  goldChange: number | null;
  silverChange: number | null;
  goldChangePct: number | null;
  silverChangePct: number | null;
  source: string;
  timestamp: string;
  error?: string;
}

interface AnalysisResult {
  text: string;
  asset: Asset;
  horizon: Horizon;
  timestamp: Date;
}

function parseAnalysis(text: string) {
  const sections: { title: string; content: string }[] = [];
  const lines = text.split('\n');
  let current: { title: string; content: string } | null = null;
  for (const line of lines) {
    if (line.startsWith('## ')) {
      if (current) sections.push(current);
      current = { title: line.replace('## ', '').trim(), content: '' };
    } else if (current) {
      current.content += line + '\n';
    }
  }
  if (current) sections.push(current);
  return sections;
}

function renderContent(content: string) {
  return content.split('\n').filter(l => l.trim()).map((line, i) => {
    const parts = line.split(/(\*\*[^*]+\*\*)/g);
    return (
      <p key={i} className="text-zinc-300 leading-relaxed">
        {parts.map((part, j) =>
          part.startsWith('**') ? (
            <strong key={j} className="text-amber-100 font-semibold">{part.replace(/\*\*/g, '')}</strong>
          ) : part
        )}
      </p>
    );
  });
}

const SECTION_ICONS: Record<string, string> = { '1': '📊', '2': '🔍', '3': '🎯', '4': '⚠️', '5': '✅' };

export default function Home() {
  const [prices, setPrices] = useState<PriceData | null>(null);
  const [loadingPrices, setLoadingPrices] = useState(false);
  const [priceError, setPriceError] = useState<string | null>(null);
  const [lastPriceFetch, setLastPriceFetch] = useState<Date | null>(null);
  const [activeAsset, setActiveAsset] = useState<Asset>('gold');
  const [horizon, setHorizon] = useState<Horizon>('tumu');
  const [manualGold, setManualGold] = useState('');
  const [manualSilver, setManualSilver] = useState('');
  const [analysis, setAnalysis] = useState<AnalysisResult | null>(null);
  const [loadingAnalysis, setLoadingAnalysis] = useState(false);
  const [analysisError, setAnalysisError] = useState<string | null>(null);

  const fetchPrices = useCallback(async () => {
    setLoadingPrices(true);
    setPriceError(null);
    try {
      const res = await fetch('/api/prices');
      const data: PriceData = await res.json();
      setPrices(data);
      setLastPriceFetch(new Date());
      if (data.error) setPriceError(data.error);
    } catch {
      setPriceError('Fiyat verisi alınamadı.');
    } finally {
      setLoadingPrices(false);
    }
  }, []);

  useEffect(() => {
    fetchPrices();
    const interval = setInterval(fetchPrices, 60000);
    return () => clearInterval(interval);
  }, [fetchPrices]);

  const effectiveGold = prices?.gold ?? (manualGold ? parseFloat(manualGold) : null);
  const effectiveSilver = prices?.silver ?? (manualSilver ? parseFloat(manualSilver) : null);
  const ratio = effectiveGold && effectiveSilver ? (effectiveGold / effectiveSilver).toFixed(1) : null;

  async function getAnalysis() {
    const gp = effectiveGold;
    const sp = effectiveSilver;
    if (activeAsset === 'gold' && !gp) { setAnalysisError('Altın fiyatı gerekiyor.'); return; }
    if (activeAsset === 'silver' && !sp) { setAnalysisError('Gümüş fiyatı gerekiyor.'); return; }
    if (activeAsset === 'compare' && (!gp || !sp)) { setAnalysisError('Her iki fiyat da gerekiyor.'); return; }
    setLoadingAnalysis(true);
    setAnalysisError(null);
    setAnalysis(null);
    try {
      const res = await fetch('/api/analysis', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ asset: activeAsset, goldPrice: gp, silverPrice: sp, goldChangePct: prices?.goldChangePct ?? null, silverChangePct: prices?.silverChangePct ?? null, horizon }),
      });
      const data = await res.json();
      if (data.error) { setAnalysisError(data.error); return; }
      setAnalysis({ text: data.analysis, asset: activeAsset, horizon, timestamp: new Date() });
    } catch {
      setAnalysisError('Analiz alınamadı. Lütfen tekrar dene.');
    } finally {
      setLoadingAnalysis(false);
    }
  }

  const horizonLabels: Record<Horizon, string> = { kisa: '1–2 Hafta', orta: '1–3 Ay', uzun: '6–12 Ay', tumu: 'Tüm Vadeler' };
  const assetLabels: Record<Asset, string> = { gold: 'Altın (XAU)', silver: 'Gümüş (XAG)', compare: 'Karşılaştır' };
  const showManual = !!(priceError || prices?.source === 'fallback');

  return (
    <main className="min-h-screen bg-zinc-950 text-zinc-100">
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap');`}</style>

      {/* Header */}
      <header className="border-b border-zinc-800 bg-zinc-950/90 backdrop-blur sticky top-0 z-50">
        <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center text-xs font-bold text-zinc-900">Au</div>
            <span className="text-lg tracking-tight" style={{ fontFamily: "'DM Serif Display', serif" }}>Emtia Öngörü</span>
          </div>
          <div className="flex items-center gap-3 text-xs text-zinc-500">
            {lastPriceFetch && (
              <span className="flex items-center gap-1">
                <Clock className="w-3 h-3" />
                {lastPriceFetch.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })}
              </span>
            )}
            <button onClick={fetchPrices} disabled={loadingPrices}
              className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-zinc-700 hover:border-zinc-500 transition-colors disabled:opacity-50 text-zinc-400 hover:text-zinc-200">
              <RefreshCw className={`w-3 h-3 ${loadingPrices ? 'animate-spin' : ''}`} />
              Güncelle
            </button>
          </div>
        </div>
      </header>

      <div className="max-w-4xl mx-auto px-4 py-6 space-y-4">

        {/* Price Cards */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
            <div className="text-xs text-zinc-500 mb-1 font-mono">XAU/USD</div>
            <div className="text-2xl font-bold text-amber-400" style={{ fontFamily: "'DM Serif Display', serif" }}>
              {effectiveGold ? `$${effectiveGold.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}` : '—'}
            </div>
            {prices?.goldChangePct != null && (
              <div className={`text-xs mt-1 flex items-center gap-1 font-mono ${prices.goldChangePct >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                {prices.goldChangePct >= 0 ? <TrendingUp className="w-3 h-3" /> : <TrendingDown className="w-3 h-3" />}
                {prices.goldChangePct >= 0 ? '+' : ''}{prices.goldChangePct}%
              </div>
            )}
          </div>
          <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
            <div className="text-xs text-zinc-500 mb-1 font-mono">XAG/USD</div>
            <div className="text-2xl font-bold text-zinc-300" style={{ fontFamily: "'DM Serif Display', serif" }}>
              {effectiveSilver ? `$${effectiveSilver.toFixed(2)}` : '—'}
            </div>
            {prices?.silverChangePct != null && (
              <div className={`text-xs mt-1 flex items-center gap-1 font-mono ${prices.silverChangePct >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                {prices.silverChangePct >= 0 ? <TrendingUp className="w-3 h-3" /> : <TrendingDown className="w-3 h-3" />}
                {prices.silverChangePct >= 0 ? '+' : ''}{prices.silverChangePct}%
              </div>
            )}
          </div>
          <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
            <div className="text-xs text-zinc-500 mb-1 font-mono">Au/Ag Oran</div>
            <div className="text-2xl font-bold text-zinc-100" style={{ fontFamily: "'DM Serif Display', serif" }}>{ratio ? `${ratio}x` : '—'}</div>
            {ratio && (
              <div className={`text-xs mt-1 font-mono ${parseFloat(ratio) > 80 ? 'text-emerald-400' : parseFloat(ratio) < 60 ? 'text-amber-400' : 'text-zinc-500'}`}>
                {parseFloat(ratio) > 80 ? 'Gümüş ucuz' : parseFloat(ratio) < 60 ? 'Gümüş pahalı' : 'Normal bölge'}
              </div>
            )}
          </div>
          <div className="bg-zinc-900 rounded-xl border border-zinc-800 p-4">
            <div className="text-xs text-zinc-500 mb-1 font-mono">Kaynak</div>
            <div className="text-sm font-medium text-zinc-300 font-mono">{prices?.source === 'fallback' ? 'Manuel' : prices?.source ?? '—'}</div>
            <div className="text-xs text-zinc-600 mt-1 font-mono">Her 60sn yenilenir</div>
          </div>
        </div>

        {/* Manual input fallback */}
        {showManual && (
          <div className="bg-amber-950/20 border border-amber-800/30 rounded-xl p-4 flex flex-wrap gap-4 items-center">
            <div className="flex items-center gap-2 text-amber-400 text-sm font-mono">
              <AlertCircle className="w-4 h-4 flex-shrink-0" />
              Canlı veri alınamadı — fiyatları manuel girin
            </div>
            <div className="flex gap-3 flex-wrap">
              <label className="flex items-center gap-2 text-sm text-zinc-400 font-mono">
                Altın $
                <input type="number" value={manualGold} onChange={e => setManualGold(e.target.value)} placeholder="4539"
                  className="w-24 bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1 text-zinc-100 text-sm font-mono focus:outline-none focus:border-amber-500" />
              </label>
              <label className="flex items-center gap-2 text-sm text-zinc-400 font-mono">
                Gümüş $
                <input type="number" value={manualSilver} onChange={e => setManualSilver(e.target.value)} placeholder="75.28"
                  className="w-24 bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-1 text-zinc-100 text-sm font-mono focus:outline-none focus:border-amber-500" />
              </label>
            </div>
          </div>
        )}

        {/* Analysis Panel */}
        <div className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
          {/* Asset Tabs */}
          <div className="flex border-b border-zinc-800">
            {(['gold', 'silver', 'compare'] as Asset[]).map(a => (
              <button key={a} onClick={() => { setActiveAsset(a); setAnalysis(null); setAnalysisError(null); }}
                className={`flex-1 py-3 px-4 text-sm font-medium transition-colors flex items-center justify-center gap-2 font-mono
                  ${activeAsset === a ? 'bg-zinc-800 text-zinc-100 border-b-2 border-amber-400' : 'text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800/40'}`}>
                {a === 'gold' && <span className="w-2 h-2 rounded-full bg-amber-400" />}
                {a === 'silver' && <span className="w-2 h-2 rounded-full bg-zinc-400" />}
                {a === 'compare' && <Scale className="w-3.5 h-3.5" />}
                {assetLabels[a]}
              </button>
            ))}
          </div>

          <div className="p-5 space-y-4">
            {/* Horizon */}
            <div>
              <div className="text-xs text-zinc-500 mb-2 uppercase tracking-wider font-mono">Öngörü vadesi</div>
              <div className="flex flex-wrap gap-2">
                {(['kisa', 'orta', 'uzun', 'tumu'] as Horizon[]).map(h => (
                  <button key={h} onClick={() => setHorizon(h)}
                    className={`px-3 py-1.5 rounded-lg text-sm border transition-colors font-mono
                      ${horizon === h ? 'bg-amber-500/20 border-amber-500/50 text-amber-300' : 'border-zinc-700 text-zinc-500 hover:border-zinc-500 hover:text-zinc-300'}`}>
                    {horizonLabels[h]}
                  </button>
                ))}
              </div>
            </div>

            {/* Button */}
            <button onClick={getAnalysis} disabled={loadingAnalysis}
              className="w-full py-3 rounded-xl bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-zinc-900 font-bold text-sm transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2 font-mono">
              {loadingAnalysis ? (
                <><RefreshCw className="w-4 h-4 animate-spin" />Analiz yapılıyor...</>
              ) : (
                <><Zap className="w-4 h-4" />{assetLabels[activeAsset]} için öngörü oluştur</>
              )}
            </button>

            {analysisError && (
              <div className="p-3 bg-red-950/40 border border-red-800/40 rounded-lg text-red-400 text-sm flex items-center gap-2 font-mono">
                <AlertCircle className="w-4 h-4 flex-shrink-0" />{analysisError}
              </div>
            )}
          </div>
        </div>

        {/* Analysis Result */}
        {analysis && (
          <div className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4 border-b border-zinc-800">
              <div>
                <div className="font-semibold text-zinc-100" style={{ fontFamily: "'DM Serif Display', serif" }}>
                  {assetLabels[analysis.asset]} — {horizonLabels[analysis.horizon]}
                </div>
                <div className="text-xs text-zinc-500 mt-0.5 font-mono">
                  {analysis.timestamp.toLocaleString('tr-TR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}
                </div>
              </div>
              <div className="flex gap-2 text-xs font-mono">
                {effectiveGold && <span className="text-amber-500/70">XAU ${effectiveGold.toLocaleString()}</span>}
                {effectiveSilver && <span className="text-zinc-400/70">XAG ${effectiveSilver.toFixed(2)}</span>}
              </div>
            </div>
            <div className="p-5 space-y-3">
              {parseAnalysis(analysis.text).map((section, i) => (
                <div key={i} className="bg-zinc-800/50 rounded-xl p-4 border border-zinc-700/50">
                  <div className="flex items-center gap-2 mb-2">
                    <span className="text-base">{SECTION_ICONS[section.title[0]] ?? '•'}</span>
                    <h3 className="font-semibold text-amber-200/80 text-sm" style={{ fontFamily: "'DM Serif Display', serif" }}>{section.title}</h3>
                  </div>
                  <div className="space-y-1 text-sm font-mono">{renderContent(section.content)}</div>
                </div>
              ))}
              {parseAnalysis(analysis.text).length === 0 && (
                <div className="text-sm text-zinc-300 leading-relaxed whitespace-pre-wrap font-mono">{analysis.text}</div>
              )}
            </div>
            <div className="px-5 pb-4 text-xs text-zinc-600 border-t border-zinc-800 pt-3 font-mono">
              ⚠ Bu analiz yapay zeka tarafından üretilmiştir. Yatırım tavsiyesi değildir.
            </div>
          </div>
        )}

        {!analysis && !loadingAnalysis && (
          <div className="text-center py-10 text-zinc-600">
            <div className="text-3xl mb-2" style={{ fontFamily: "'DM Serif Display', serif" }}>✦</div>
            <div className="text-sm font-mono">Emtia seç, vade belirle ve öngörü oluştur</div>
          </div>
        )}
      </div>
    </main>
  );
}
