import { NextRequest, NextResponse } from 'next/server';
import { GoogleGenerativeAI } from '@google/generative-ai';

const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY!);

function buildPrompt(asset: string, goldPrice: number, silverPrice: number, goldChangePct: number | null, silverChangePct: number | null, horizon: string) {
  const ratio = goldPrice && silverPrice ? (goldPrice / silverPrice).toFixed(1) : null;
  const horizonMap: Record<string, string> = {
    kisa: 'kısa vade (1–2 hafta)',
    orta: 'orta vade (1–3 ay)',
    uzun: 'uzun vade (6–12 ay)',
    tumu: 'kısa vade (1–2 hafta), orta vade (1–3 ay) ve uzun vade (6–12 ay)',
  };
  const hStr = horizonMap[horizon] ?? horizonMap['tumu'];

  const macroContext = `
Güncel makro bağlam (Mayıs–Haziran 2026):
- Fed politika faizi 3.50–3.75% bandında (3 toplantıdır sabit)
- Nisan 2026 CPI beklentilerin üzerinde geldi → ilk faiz kesimi en erken Eylül'e ertelendi
- ABD-Çin tarife ateşkesi Mayıs 2026'da imzalandı → sanayi talebi canlandı
- Altın Ocak 2026'da $5,589 ile rekor kırdı, şu an geri çekilmiş durumda
- Gümüş 6. yıllık arz açığına girdi; kümülatif stok erimesi ~762 milyon ons
- Au/Ag oranı: ${ratio ?? 'hesaplanamadı'}x (tarihsel ortalama ~65–80)`;

  if (asset === 'compare') {
    return `Sen deneyimli bir emtia analistsin. ${hStr} için altın ve gümüşü karşılaştırmalı analiz et.

Veriler:
- Altın (XAU/USD): $${goldPrice}${goldChangePct !== null ? ` (${goldChangePct >= 0 ? '+' : ''}${goldChangePct}% günlük)` : ''}
- Gümüş (XAG/USD): $${silverPrice}${silverChangePct !== null ? ` (${silverChangePct >= 0 ? '+' : ''}${silverChangePct}% günlük)` : ''}
- Au/Ag Oranı: ${ratio}x
${macroContext}

Şu başlıkları ver:
## 1. GÜNCEL DURUM
## 2. KARŞILAŞTIRMA
## 3. ${hStr.toUpperCase()} ÖNGÖRÜLER
## 4. RİSK FAKTÖRLERİ
## 5. SONUÇ: TERCİH

Türkçe yaz. Somut rakamlar ver. Belirsiz ifade kullanma.`;
  }

  const isGold = asset === 'gold';
  const name = isGold ? 'Altın (XAU/USD)' : 'Gümüş (XAG/USD)';
  const price = isGold ? goldPrice : silverPrice;
  const changePct = isGold ? goldChangePct : silverChangePct;

  return `Sen deneyimli bir emtia analistsin. ${name} için ${hStr} kapsamlı analiz yap.

Veriler:
- Güncel fiyat: $${price}${changePct !== null ? ` (${changePct >= 0 ? '+' : ''}${changePct}% günlük değişim)` : ''}
${!isGold && ratio ? `- Au/Ag Oranı: ${ratio}x` : ''}
${macroContext}

Şu başlıkları ver:
## 1. GÜNCEL DURUM
## 2. TEKNİK GÖRÜNÜM
## 3. ${hStr.toUpperCase()} ÖNGÖRÜ
## 4. RİSK FAKTÖRLERİ
## 5. ÖZET KARAR

Türkçe yaz. Somut rakamlar ver. Her bölümde net ol.`;
}

export async function POST(req: NextRequest) {
  try {
    const body = await req.json();
    const { asset, goldPrice, silverPrice, goldChangePct, silverChangePct, horizon } = body;

    if (!goldPrice && !silverPrice) {
      return NextResponse.json({ error: 'Fiyat verisi eksik' }, { status: 400 });
    }

    const model = genAI.getGenerativeModel({ model: 'gemini-1.5-flash' });
    const prompt = buildPrompt(asset, goldPrice, silverPrice, goldChangePct, silverChangePct, horizon);
    const result = await model.generateContent(prompt);
    const text = result.response.text();

    return NextResponse.json({ analysis: text });
  } catch (err: unknown) {
    const message = err instanceof Error ? err.message : 'Bilinmeyen hata';
    return NextResponse.json({ error: message }, { status: 500 });
  }
}
